<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gene Collapse</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .cover-page {
      min-height: 100vh;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    .cover-page img {
      width: 100%;
      max-width: 1100px;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.35);
    }

    .start-btn {
      margin-top: 28px;
      padding: 15px 38px;
      border: none;
      border-radius: 999px;
      background: #d71920;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(255, 0, 0, 0.55);
    }

    .start-btn:hover {
      background: #ff3030;
    }

    .player-page {
      display: none;
      min-height: 100vh;
      padding: 30px 20px 110px;
      background: radial-gradient(circle at center, #1b0707 0%, #050505 60%);
      text-align: center;
    }

    .scene-title {
      color: #ff3333;
      font-size: 28px;
      letter-spacing: 3px;
      margin: 10px 0 22px;
    }

    video {
      width: 100%;
      max-width: 1100px;
      border-radius: 18px;
      background: black;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.35);
    }

    .caption {
      max-width: 850px;
      margin: 22px auto;
      color: #ddd;
      font-size: 18px;
      line-height: 1.7;
    }

    .controls {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 12px 22px;
      border-radius: 999px;
      border: 1px solid #ff3333;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .controls button:hover {
      background: #ff3333;
    }

    .ending-buttons {
      display: none;
      margin-top: 26px;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .ending-buttons button {
      padding: 14px 24px;
      border-radius: 999px;
      border: none;
      background: #8b0000;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .ending-buttons button:hover {
      background: #d71920;
    }

    .scene-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95%;
      padding: 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .scene-nav button {
      border: 1px solid #ff3333;
      background: #111;
      color: white;
      border-radius: 999px;
      padding: 8px 13px;
      cursor: pointer;
      font-size: 13px;
    }

    .scene-nav button:hover {
      background: #ff3333;
    }
  </style>
</head>

<body>

  <!-- 표지 화면 -->
  <section class="cover-page" id="coverPage">
    <img src="./image/cover.png" alt="cover image">
    <button class="start-btn" onclick="startStory()">시스템 접속</button>
  </section>

  <!-- 영상 재생 화면 -->
  <section class="player-page" id="playerPage">
    <h1 class="scene-title" id="sceneTitle">COVER</h1>

    <video id="sceneVideo" controls playsinline muted preload="metadata" poster="./image/cover.png">
      <source id="videoSource" src="./video/cover.mp4" type="video/mp4">
      브라우저가 영상을 지원하지 않습니다.
    </video>

    <p class="caption" id="sceneCaption">
      붉은 유전자 오류가 시작되고, 시스템은 지나를 위험 개체로 분류한다.
    </p>

    <div class="controls">
      <button onclick="prevScene()">이전</button>
      <button onclick="nextScene()">다음</button>
      <button onclick="replayScene()">다시 보기</button>
    </div>

    <div class="ending-buttons" id="endingButtons">
      <button onclick="goToSpecialScene('end_a')">END_A</button>
      <button onclick="goToSpecialScene('end_b')">END_B</button>
      <button onclick="goToSpecialScene('g_over')">G_OVER</button>
      <button onclick="goToSpecialScene('re_s4')">RE_S4</button>
    </div>
  </section>

  <!-- 하단 장면 이동 버튼 -->
  <nav class="scene-nav" id="sceneNav">
    <button onclick="goToScene(0)">COVER</button>
    <button onclick="goToScene(1)">S1</button>
    <button onclick="goToScene(2)">S2</button>
    <button onclick="goToScene(3)">S3</button>
    <button onclick="goToScene(4)">S4</button>
    <button onclick="goToScene(5)">S5</button>
    <button onclick="goToScene(6)">S6</button>
    <button onclick="goToScene(7)">S7</button>
    <button onclick="goToSpecialScene('end_a')">END_A</button>
    <button onclick="goToSpecialScene('end_b')">END_B</button>
    <button onclick="goToSpecialScene('g_over')">G_OVER</button>
    <button onclick="goToSpecialScene('re_s4')">RE_S4</button>
  </nav>

  <script>
    const scenes = [
      {
        title: "COVER",
        video: "./video/cover.mp4",
        poster: "./image/cover.png",
        caption: "붉은 유전자 오류가 시작되고, 시스템은 지나를 위험 개체로 분류한다."
      },
      {
        title: "S1",
        video: "./video/s1.mp4",
        poster: "./image/s1.png",
        caption: "지나는 자신의 몸에 나타난 유전자 균열을 발견하고 불안에 휩싸인다."
      },
      {
        title: "S2",
        video: "./video/s2.mp4",
        poster: "./image/s2.png",
        caption: "감시 드론은 지나를 스캔하고, 시스템은 그녀를 추적 대상으로 인식한다."
      },
      {
        title: "S3",
        video: "./video/s3.mp4",
        poster: "./image/s3.png",
        caption: "도시는 지나를 위험한 존재로 감시하기 시작하고, 그녀의 고립은 깊어진다."
      },
      {
        title: "S4",
        video: "./video/s4.mp4",
        poster: "./image/s4.png",
        caption: "유전자 붕괴가 가속화되며, 지나는 자신의 정체성이 무너지는 순간을 마주한다."
      },
      {
        title: "S5",
        video: "./video/s5.mp4",
        poster: "./image/s5.png",
        caption: "시스템의 경고는 더욱 강해지고, 지나의 존재는 삭제 대상으로 향한다."
      },
      {
        title: "S6",
        video: "./video/s6.mp4",
        poster: "./image/s6.png",
        caption: "지나는 끝없는 데이터 속에서 자신의 존재가 희미해지는 것을 느낀다."
      },
      {
        title: "S7",
        video: "./video/s7.mp4",
        poster: "./image/s7.png",
        caption: "마지막 선택의 순간, 지나의 운명은 완전한 삭제와 생존의 갈림길에 선다."
      }
    ];

    const specialScenes = {
      end_a: {
        title: "END_A",
        video: "./video/end_a.mp4",
        poster: "./image/end_a.png",
        caption: "지나는 시스템의 삭제를 받아들이고, 조용히 데이터 속으로 사라진다."
      },
      end_b: {
        title: "END_B",
        video: "./video/end_b.mp4",
        poster: "./image/end_b.png",
        caption: "지나는 완전히 사라지지 않고, 희미한 생존의 가능성을 남긴다."
      },
      g_over: {
        title: "G_OVER",
        video: "./video/g_over.mp4",
        poster: "./image/g_over.png",
        caption: "유전자 시스템은 지나의 존재 기록을 삭제하고, 모든 신원 데이터가 붕괴된다."
      },
      re_s4: {
        title: "RE_S4",
        video: "./video/re_s4.mp4",
        poster: "./image/RE_s4.png",
        caption: "붕괴 이후, 지나는 다시 선택의 순간으로 되돌아간다."
      }
    };

    let currentIndex = 0;

    const coverPage = document.getElementById("coverPage");
    const playerPage = document.getElementById("playerPage");
    const sceneNav = document.getElementById("sceneNav");
    const sceneTitle = document.getElementById("sceneTitle");
    const sceneVideo = document.getElementById("sceneVideo");
    const videoSource = document.getElementById("videoSource");
    const sceneCaption = document.getElementById("sceneCaption");
    const endingButtons = document.getElementById("endingButtons");

    function startStory() {
      coverPage.style.display = "none";
      playerPage.style.display = "block";
      sceneNav.style.display = "flex";
      goToScene(0);
    }

    function loadScene(scene) {
      sceneTitle.textContent = scene.title;
      videoSource.src = scene.video;
      sceneVideo.poster = scene.poster;
      sceneCaption.textContent = scene.caption;
      sceneVideo.load();
      sceneVideo.play().catch(() => {});
    }

    function goToScene(index) {
      currentIndex = index;
      endingButtons.style.display = index === scenes.length - 1 ? "flex" : "none";
      loadScene(scenes[currentIndex]);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function nextScene() {
      if (currentIndex < scenes.length - 1) {
        goToScene(currentIndex + 1);
      } else {
        endingButtons.style.display = "flex";
      }
    }

    function prevScene() {
      if (currentIndex > 0) {
        goToScene(currentIndex - 1);
      }
    }

    function replayScene() {
      sceneVideo.currentTime = 0;
      sceneVideo.play().catch(() => {});
    }

    function goToSpecialScene(key) {
      endingButtons.style.display = "none";
      loadScene(specialScenes[key]);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>

</body>
</html>
